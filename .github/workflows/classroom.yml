name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: test-1-1
      id: test-1-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-1-1
        setup-command: gcc ./code/1-1.c -o ./a
        command: "./a"
        input: ''
        expected-output: '16 13

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test-1-2
      id: test-1-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-1-2
        setup-command: gcc ./code/1-2.c -o ./a
        command: "./a"
        input: ''
        expected-output: |
          version: 0, size: 4
          ihl: 0, size: 4
          ttl: 256, size: 8
          protocol: 0, size: 8
          data: hello world, size: 1024
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test-1-3
      id: test-1-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-1-3
        setup-command: gcc ./code/1-3.c -o ./a
        command: "./a"
        input: ''
        expected-output: |
          .*
          update_ptr
        comparison-method: regex
        timeout: 10
        max-score: 1
    - name: test-1-4
      id: test-1-4
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-1-4
        setup-command: gcc ./code/1-4.c -o ./a
        command: "./a"
        input: ''
        expected-output: |-
          .+
          .+
        comparison-method: regex
        timeout: 10
        max-score: 1
    - name: test-2-1
      id: test-2-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-2-1
        setup-command: gcc ./code/2-1.c -o ./a
        command: "./a"
        input: ''
        expected-output: |
          c3
          f5
          48
          40
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test-2-2
      id: test-2-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-2-2
        setup-command: gcc ./code/2-2.c -o ./a
        command: "./a"
        input: ''
        expected-output: 'current mode: 5

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test-3-1
      id: test-3-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-3-1
        setup-command: gcc ./code/3-1.c -o ./a
        command: "./a"
        input: |
          add kim 100
          add lee 80
          add park 60
          print
          delete lee
          print
          quit
        expected-output: |
          kim 100
          lee 80
          park 60
          kim 100
          park 60
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST-1-1_RESULTS: "${{steps.test-1-1.outputs.result}}"
        TEST-1-2_RESULTS: "${{steps.test-1-2.outputs.result}}"
        TEST-1-3_RESULTS: "${{steps.test-1-3.outputs.result}}"
        TEST-1-4_RESULTS: "${{steps.test-1-4.outputs.result}}"
        TEST-2-1_RESULTS: "${{steps.test-2-1.outputs.result}}"
        TEST-2-2_RESULTS: "${{steps.test-2-2.outputs.result}}"
        TEST-3-1_RESULTS: "${{steps.test-3-1.outputs.result}}"
      with:
        runners: test-1-1,test-1-2,test-1-3,test-1-4,test-2-1,test-2-2,test-3-1
